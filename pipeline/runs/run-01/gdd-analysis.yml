    ux:
      discovery: "Automatic — player waits passively"
      feedback: "Progress bar and spinner shown during load"
      onboarding: "N/A — passive wait, transitions automatically to start"
    notes: >
      Functional implementation exists with spinner + progress bar. Background color (#BCE083)
      does not match GDD's stark abstract test environment theme but is a scaffold default —
      classified partial rather than content-gap because the mechanism is complete.
      Theme color is a soft collision (see warnings). Expected duration < 2s per GDD is
