features:

  # ── EXISTS ─────────────────────────────────────────────────────────────────

  - id: game-kit-integration
    name: "Wolf Games game-kit integration (analytics, tracking, audio, assets)"
    status: exists
    lifecycle_phase: BOOT
    risk: LOW
    complexity: low
    cos_required: []
    ux_zones: {}
    affected_files: []
    dependencies: []
