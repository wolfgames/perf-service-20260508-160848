  - "collision:start-screen-background — gdd=stark-abstract-test-environment vs scaffold=#BCE083 (src/game/mygame/screens/startView.ts line 22) — soft"
  - "collision:results-screen-heading — gdd='Oops! Try Again?' (loss) vs scaffold='Game Over' (src/game/screens/ResultsScreen.tsx line 23) — soft"
  - "collision:results-screen-layout — gdd=two-distinct-outcome-screens (Level Complete + Loss) vs scaffold=single-ResultsScreen (src/game/screens/ResultsScreen.tsx) — soft"
  - "collision:scoring-dimensions — gdd=single-distance-score (no combo/chain multipliers) vs cos-scoring=at-least-2-multiplicative-dimensions (references/conditions/scoring.md) — soft"
  - "collision:character-visual-size — gdd=32x32px-character-sprite vs cos-canvas=48x48px-minimum-piece-size (references/conditions/canvas.md) — soft"
