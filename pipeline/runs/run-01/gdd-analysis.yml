  # ── PARTIAL ────────────────────────────────────────────────────────────────

  - id: loading-screen
    name: "Loading Screen (BOOT)"
    status: partial
    lifecycle_phase: BOOT
    risk: LOW
    complexity: low
    cos_required: []
    ux_zones:
