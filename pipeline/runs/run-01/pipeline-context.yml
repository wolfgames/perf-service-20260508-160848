    position: bottom
    height-px: 32
    css: "absolute bottom-8 left-1/2 -translate-x-1/2"
  - element: PauseOverlay
    file: src/game/screens/GameScreen.tsx
    position: overlay
    height-px: 0
    css: "sr-only / modal overlay (no reserved space)"
  - element: AccessibilityAnnouncer
    file: src/game/screens/GameScreen.tsx
    position: overlay
    height-px: 0
    css: "sr-only (screen reader only, no visual space)"

